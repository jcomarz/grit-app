// Bible API (free, no key needed)
async function bibleSearch(query){
  try{
    // Try bible-api.com first
    const res=await fetch('https://bible-api.com/'+encodeURIComponent(query)+'?translation=kjv');
    if(!res.ok)throw new Error('Not found');
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    return{ref:data.reference,text:data.text?.trim(),verses:data.verses};
  }catch(e){
    // Fallback: try web translation
    try{
      const res=await fetch('https://bible-api.com/'+encodeURIComponent(query));
      if(!res.ok)return null;
      const data=await res.json();
      if(data.error)return null;
      return{ref:data.reference,text:data.text?.trim()};
    }catch{return null}
  }
}

// Cloud helpers
async function cloudInit(){
  const rc=LS.g('room_code');if(!rc)return;
  const creds=decodeRoom(rc);if(!creds)return;
  try{
    C.sb=supabase.createClient(creds.url,creds.key);
    const{data:{session}}=await C.sb.auth.getSession();
    if(session){C.user=session.user;await cloudLoad();setupRealtime()}
  }catch(e){console.warn('Cloud init failed:',e)}
}
async function cloudLoad(){
  if(!isCloud())return;
  const u=C.user.id;
  const[p,m]=await Promise.all([
    C.sb.from('profiles').select('*').eq('user_id',u).single(),
    C.sb.from('brotherhood_messages').select('*').or(`user_id.eq.${u},recipient_id.eq.${u}`).order('created_at',{ascending:true}),
  ]);
  if(p.data)C.cloudProfile=p.data;
  C.cloudMsgs=m.data||[];
  // Load brother info if paired
  if(C.cloudProfile?.brother_user_id){
    const{data:bro}=await C.sb.from('profiles').select('name,share_code,user_id').eq('user_id',C.cloudProfile.brother_user_id).single();
    if(bro)C.brothers=[bro];
  }
}
function setupRealtime(){
  if(!isCloud()||!C.cloudProfile?.brother_user_id)return;
  C.sb.channel('live_msgs').on('postgres_changes',{event:'INSERT',schema:'public',table:'brotherhood_messages',filter:`recipient_id=eq.${C.user.id}`},payload=>{
    if(!C.cloudMsgs.find(m=>m.id===payload.new.id)){C.cloudMsgs.push(payload.new);R();
    if(Notification.permission==='granted')try{new Notification('GR!T',{body:payload.new.text})}catch(e){}}
  }).subscribe();
}
async function cloudSignUp(email,pass,name){
  const{data,error}=await C.sb.auth.signUp({email,password:pass});
  if(error)throw error;
  C.user=data.user;
  // Wait a moment for trigger, then update name
  await new Promise(r=>setTimeout(r,500));
  await C.sb.from('profiles').update({name,onboarded:true}).eq('user_id',C.user.id);
  await cloudLoad();
}
async function cloudSignIn(email,pass){
  const{data,error}=await C.sb.auth.signInWithPassword({email,password:pass});
  if(error)throw error;
  C.user=data.user;await cloudLoad();setupRealtime();
}
async function cloudPair(code){
  // Find brother by share_code
  const{data}=await C.sb.from('profiles').select('user_id,name,share_code').eq('share_code',code);
  if(!data||!data.length)return'No one found with that code.';
  const bro=data[0];
  if(bro.user_id===C.user.id)return"That's your own code!";
  // Pair both ways
  await C.sb.from('profiles').update({brother_user_id:bro.user_id,brother_name:bro.name}).eq('user_id',C.user.id);
  await C.sb.from('profiles').update({brother_user_id:C.user.id,brother_name:C.cloudProfile.name}).eq('user_id',bro.user_id);
  C.cloudProfile.brother_user_id=bro.user_id;C.cloudProfile.brother_name=bro.name;
  C.brothers=[bro];
  D.profile.brother_name=bro.name;save();
  setupRealtime();return null;
}
async function cloudSendMsg(text,type='message'){
  const bro=C.cloudProfile.brother_user_id;
  const{data}=await C.sb.from('brotherhood_messages').insert({user_id:C.user.id,recipient_id:bro,text,sender_name:C.cloudProfile.name||D.profile.name,msg_type:type}).select().single();
  if(data)C.cloudMsgs.push(data);R();
}

async function initRoom(){
  const rc=LS.g('room_code');if(!rc)return;
  const creds=decodeRoom(rc);if(!creds)return;
  try{C.sb=supabase.createClient(creds.url,creds.key);const{data:{session}}=await C.sb.auth.getSession();if(session){C.user=session.user;await cloudLoad();setupRealtime()}}catch(e){console.warn('Room init:',e)}
}
load();
initRoom().then(()=>R());
